name: Clone and Push Repo Between Organizations

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Source repository URL (e.g., https://github.com/source-org/repo.git)'
        required: true
        type: string
      destination_repo:
        description: 'Destination repository URL (e.g., https://github.com/dest-org/repo.git)'
        required: true
        type: string

jobs:
  clone-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clone source repository (private)
        run: |
          SOURCE_URL=$(echo "${{ github.event.inputs.source_repo }}" | sed 's|https://|https://${{ secrets.SOURCE_PAT_TOKEN }}@|')
          git clone --mirror "$SOURCE_URL" temp-repo
        env:
          GIT_TERMINAL_PROMPT: 0

      - name: Push to destination repository
        run: |
          cd temp-repo
          git push --mirror https://${{ secrets.DEST_PAT_TOKEN }}@github.com/${{ github.event.inputs.destination_repo }}
        env:
          GIT_TERMINAL_PROMPT: 0

      - name: Cleanup
        if: always()
        run: |
          rm -rf temp-repo
