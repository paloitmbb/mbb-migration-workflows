name: Clone and Push Repo Between Organizations

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Source repository URL (e.g., https://github.com/source-org/repo.git)'
        required: true
        type: string
      destination_repo:
        description: 'Destination repository URL (e.g., https://github.com/dest-org/repo.git)'
        required: true
        type: string

jobs:
  clone-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clone source repository (private)
        run: |
          SOURCE_URL=$(echo "${{ github.event.inputs.source_repo }}" | sed 's|https://|https://${{ secrets.SOURCE_PAT_TOKEN }}@|')
          git clone --mirror "$SOURCE_URL" temp-repo
        env:
          GIT_TERMINAL_PROMPT: 0

      - name: Push to destination repository
        run: |
          DEST_REPO=$(echo "${{ github.event.inputs.destination_repo }}" | sed 's|https://github.com/||' | sed 's|/$||')
          DEST_URL="https://${{ secrets.DEST_PAT_TOKEN }}@github.com/${DEST_REPO}.git"
          cd temp-repo
          git push "$DEST_URL" 'refs/heads/*:refs/heads/*'
          git push "$DEST_URL" 'refs/tags/*:refs/tags/*'
        env:
          GIT_TERMINAL_PROMPT: 0

      - name: Sync default branch from source to destination
        run: |
          SOURCE_REPO=$(echo "${{ github.event.inputs.source_repo }}" | sed 's|https://github.com/||' | sed 's|\.git$||' | sed 's|/$||')
          DEST_REPO=$(echo "${{ github.event.inputs.destination_repo }}" | sed 's|https://github.com/||' | sed 's|\.git$||' | sed 's|/$||')

          # Get source default branch
          DEFAULT_BRANCH=$(curl -s -H "Authorization: token ${{ secrets.SOURCE_PAT_TOKEN }}" \
            "https://api.github.com/repos/${SOURCE_REPO}" | jq -r '.default_branch')

          echo "Source default branch: $DEFAULT_BRANCH"

          # Set same default branch on destination
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.DEST_PAT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"default_branch\": \"${DEFAULT_BRANCH}\"}" \
            "https://api.github.com/repos/${DEST_REPO}"

          echo "Default branch on destination set to: $DEFAULT_BRANCH"

      - name: Cleanup
        if: always()
        run: |
          rm -rf temp-repo
